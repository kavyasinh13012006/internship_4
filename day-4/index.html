<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLG ADDMISSION FORM</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <form>
            <div class="box1">
                <h1>Admission inquiry</h1>
                <p>
                    Please fill out the form below to enquire about our Programs.
                </p>
            </div>
            <div class="box2">
                
                <input type="text" id="name" placeholder="name*" required />
                <input type="tel" id="number" placeholder="contact*" required >
               <input type="email" id="email" placeholder="email*" required />
                <select name="country" id="country">   
                    <option value="">select your country</option>
                    <option value="INDIA">INDIA</option>
                    <option value="AMERICA">AMERICA</option>
                    <option value="SOUTH AFRICA">SOUTH AFRICA</option>
                    <option value="DUBAI">DUBAI</option>
                    <option value="CHINA">CHINA</option>
                    <option value="FRANCE">FRANCE</option>
                    <option value="NEPAL">NEPAL</option>


                </select>
                <select name="State" id="State">
                    <option value="">select your State</option>
                    <option value="GUJRAT">GUJRAT</option>
                    <option value="MUBAI">MUBAI</option>
                    <option value="RAJSATN">RAJSATN</option>
                    <option value="CHENNI">CHENNI</option>
                    <option value="GOA">GOA</option>
                    <option value="DEHLI">DEHLI</option>
                    <option value="BIHAR">BIHAR</option>


                </select>
                <select name="City" id="City">
                    <option value="">select your City</option>
                    <option value="SURAT">SURAT</option>
                    <option value="NAVSARI">NAVSARI</option>
                    <option value="RAJKOT">RAJKOT</option>
                    <option value="JAMNAGAR">JAMNAGAR</option>
                    <option value="BHAVNAGAR">BHAVNAGAR</option>
                    <option value="VADODRA">VADODRA</option>
                    <option value="GANDHINAGAR">GANDHINAGAR</option>


                </select>
                <select name="Course" id="Course">
                    <option value="">select your Course</option>
                    <option value="Artificial Intelligence (AI) & Machine Learning (ML)">Artificial Intelligence (AI) &
                        Machine Learning (ML)</option>
                    <option value="Data Science & Business Analytics">Data Science & Business Analytics</option>
                    <option value="Cloud Computing">Cloud Computing</option>
                    <option value="Cybersecurity & Ethical Hacking">Cybersecurity & Ethical Hacking</option>
                    <option value="Master of Business Administration">Master of Business Administration</option>
                    <option value="Digital Marketing & Growth Hacking">Digital Marketing & Growth Hacking</option>
                    <option value="UI/UX Design">UI/UX Design</option>


                </select>
                <select name="Branch" id="Branch">
                    <option value="">select your Branch</option>
                    <option value="INFORNATION TECHNOLOGY">INFORNATION TECHNOLOGY</option>
                    <option value="COMPUTER SCI.">COMPUTER SCI.</option>
                    <option value="COMPUTER ENGINEERING">COMPUTER ENGINEERING</option>
                    <option value="CIVIL ENGINEERING">CIVIL ENGINEERING</option>
                    <option value="ERONOTICAL ENGINEERING">ERONOTICAL ENGINEERING</option>
                    <option value="CHEMICAL ENGINEERING">CHEMICAL ENGINEERING</option>
                    <option value="HACKING">HACKING</option>


                </select>
                <textarea id="message" placeholder="Message"></textarea><br>
                <button class="button" type="submit">Apply now!</button>
                


            </div>


    </div>


    </form>

</body>

</html>
